{% extends "base.html" %}
{% block title %}A01 – Order{% endblock %}
{% block content %}
<h4><a href="/a01/">A01</a> — Order #{{ order.id }}
  <span class="badge bg-danger ms-2">IDOR</span>
</h4>
<div class="card" style="max-width:400px">
  <div class="card-body">
    <table class="table table-dark table-sm">
      <tr><th>Order ID</th><td>{{ order.id }}</td></tr>
      <tr><th>User ID</th><td>{{ order.user_id }}</td></tr>
      <tr><th>Item</th><td>{{ order.item }}</td></tr>
      <tr><th>Amount</th><td>${{ "%.2f"|format(order.amount) }}</td></tr>
    </table>
  </div>
</div>
<div class="alert alert-dark mt-3">
  <strong>Try:</strong>
  <a href="/a01/orders/1">Order 1</a> |
  <a href="/a01/orders/2">Order 2</a> |
  <a href="/a01/orders/3">Order 3</a>
</div>
{% endblock %}
