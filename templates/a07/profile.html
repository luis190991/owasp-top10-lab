{% extends "base.html" %}
{% block title %}A07 – Perfil{% endblock %}
{% block content %}
<h4><a href="/a07/">A07</a> — Perfil</h4>
{% if user %}
<div class="card mb-3" style="max-width:450px">
  <div class="card-body">
    <p><strong>Usuario:</strong> {{ user.username }}</p>
    <p><strong>Rol:</strong> {{ user.role }}</p>
    <p><strong>ID de sesión usado:</strong> <code>{{ sid }}</code></p>
  </div>
</div>
<a href="/a07/logout" class="btn btn-outline-secondary btn-sm">Cerrar Sesión</a>
{% else %}
<p class="text-secondary">No autenticado.</p>
<a href="/a07/login" class="btn btn-danger btn-sm">Iniciar Sesión</a>
{% endif %}
{% endblock %}
