{% extends "base.html" %}
{% block title %}A02 – Iniciar Sesión{% endblock %}
{% block content %}
<h4><a href="/a02/">A02</a> — Login con Credenciales por Defecto</h4>
<div class="card" style="max-width:420px">
  <div class="card-body">
    {% if message %}
    <div class="alert alert-{{ 'success' if 'SUCCESS' in message else 'danger' }}">{{ message }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input name="username" class="form-control" placeholder="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input name="password" type="password" class="form-control" placeholder="admin">
      </div>
      <button class="btn btn-warning text-dark w-100">Iniciar Sesión</button>
    </form>
    <hr>
    <small class="text-secondary">Pista: las credenciales por defecto nunca fueron cambiadas.</small>
  </div>
</div>
{% endblock %}
