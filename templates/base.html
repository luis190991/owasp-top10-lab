<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OWASP Top 10 Lab{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; color: #c9d1d9; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    code, pre { background: #0d1117; color: #f0883e; border: 1px solid #30363d; }
    pre { padding: .75rem; border-radius: .375rem; overflow-x: auto; }
    .badge-vuln  { background-color: #da3633; }
    .badge-fixed { background-color: #238636; }
    .lab-card:hover { border-color: #58a6ff; cursor: pointer; }
    a { color: #58a6ff; }
    a:hover { color: #79c0ff; }
    .alert-dark { background: #21262d; border-color: #30363d; color: #c9d1d9; }
    .form-control, .form-select {
      background: #0d1117; border-color: #30363d; color: #c9d1d9;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; border-color: #58a6ff; color: #c9d1d9; box-shadow: none;
    }
    .btn-danger-outline { border-color: #da3633; color: #da3633; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <span class="text-danger">⚠</span> OWASP Top 10:2025 Lab
    </a>
    <div class="d-flex">
      <a href="https://owasp.org/Top10/2025/" target="_blank" class="btn btn-sm btn-outline-secondary">
        OWASP Docs ↗
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
