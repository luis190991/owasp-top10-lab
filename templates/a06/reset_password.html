{% extends "base.html" %}
{% block title %}A06 – Restablecer Contraseña{% endblock %}
{% block content %}
<h4><a href="/a06/">A06</a> — Restablecer Contraseña</h4>
<div class="card" style="max-width:450px">
  <div class="card-body">
    {% if message %}
    <div class="alert alert-{{ 'success' if 'successfully' in message or 'restablecida' in message else 'danger' }}">{{ message }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input name="username" class="form-control" placeholder="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">Token de restablecimiento</label>
        <input name="token" class="form-control font-monospace" placeholder="hash md5">
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input name="new_password" class="form-control" placeholder="nueva contraseña">
      </div>
      <button class="btn btn-warning text-dark w-100">Restablecer Contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
