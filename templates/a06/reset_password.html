{% extends "base.html" %}
{% block title %}A06 – Reset Password{% endblock %}
{% block content %}
<h4><a href="/a06/">A06</a> — Reset Password</h4>
<div class="card" style="max-width:450px">
  <div class="card-body">
    {% if message %}
    <div class="alert alert-{{ 'success' if 'successfully' in message else 'danger' }}">{{ message }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">Reset Token</label>
        <input name="token" class="form-control font-monospace" placeholder="md5 hash">
      </div>
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input name="new_password" class="form-control" placeholder="newpassword">
      </div>
      <button class="btn btn-warning text-dark w-100">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
