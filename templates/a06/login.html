{% extends "base.html" %}
{% block title %}A06 – Login{% endblock %}
{% block content %}
<h4><a href="/a06/">A06</a> — Login</h4>
<div class="card" style="max-width:400px">
  <div class="card-body">
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="alice">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="alicepass">
      </div>
      <button class="btn btn-warning text-dark w-100">Login</button>
    </form>
    <hr>
    <small class="text-secondary">Credentials: alice/alicepass · admin/adminpass</small>
  </div>
</div>
{% endblock %}
