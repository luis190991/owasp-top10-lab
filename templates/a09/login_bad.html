{% extends "base.html" %}
{% block title %}A09 – Login (MAL){% endblock %}
{% block content %}
<h4><a href="/a09/">A09</a> — Iniciar Sesión
  <span class="badge bg-danger ms-2">Registra contraseña en texto plano</span>
</h4>
<div class="card mb-3" style="max-width:400px">
  <div class="card-body">
    {% if result %}
    <div class="alert alert-{{ 'success' if result.status=='success' else 'warning' }}">
      {{ 'ÉXITO' if result.status=='success' else 'FALLO' }} — ¡revisa <a href="/a09/view-logs">los logs</a>!
    </div>
    {% endif %}
    <form method="post">
      <div class="mb-2">
        <label class="form-label">Usuario</label>
        <input name="username" class="form-control" placeholder="alice">
      </div>
      <div class="mb-2">
        <label class="form-label">Contraseña</label>
        <input name="password" class="form-control" placeholder="sunshine">
      </div>
      <button class="btn btn-danger w-100">Login (MAL)</button>
    </form>
  </div>
</div>
<a href="/a09/view-logs" class="btn btn-outline-secondary btn-sm">→ Ver Logs Después del Login</a>
{% endblock %}
